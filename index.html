<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <p id="status">読み込み中です…</p>

  <script>
    const LIFF_ID = "2010723399-tGSQaLyq";
const EXPERIENCE_URL = "https://line.me/R/ti/p/@your_official_account_id";
const GAS_URL = "https://script.google.com/macros/s/AKfycbxs0pLGl_U-2edz6UUAD9kEq9pO0hlQVRXBhj7C8W8TZOyMQ8dUpPOCJeh9td0nARTPkw/exec";

async function main() {
  const status = document.getElementById("status");
  try {
    status.innerText = "LIFF初期化中…";
    await liff.init({ liffId: LIFF_ID });

    status.innerText = "ログイン確認中…";
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    status.innerText = "パラメータ確認中…";
    const params = new URLSearchParams(window.location.search);
    const agencyId = params.get("agency");

    if (!agencyId) {
      status.innerText = "代理店情報が見つかりません。(URLに?agency=xxxが必要です)";
      return;
    }

    status.innerText = "プロフィール取得中…";
    const profile = await liff.getProfile();
    const userId = profile.userId;

    status.innerText = "サーバーに送信中…";
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ userId: userId, agencyId: agencyId })
    });
    const result = await res.json();

    if (result.error) {
      status.innerText = "サーバーエラー: " + result.error;
      return;
    }

    status.innerText = "体験ページへ移動します…";
    setTimeout(() => {
      location.href = EXPERIENCE_URL;
    }, 800);

  } catch (err) {
    status.innerText = "エラーが発生しました: " + err.message;
    console.error(err);
  }
}

main();
  </script>
</body>
</html>
